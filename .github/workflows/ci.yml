name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # https://github.com/wyvox/action-setup-pnpm
      - uses: wyvox/action-setup-pnpm@v4
        with: { node-version: 24, pnpm-version: 10 }

      - name: lint
        run: pnpm run lint

      - name: test
        run: pnpm run test:ci
